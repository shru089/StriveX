name: StriveX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: Lint + Test ───────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8 --quiet
          # Stop build on syntax errors or undefined names; warn on style
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

  # ─── Frontend: Static Analysis ─────────────────────────────────────────────
  frontend:
    name: Frontend (Static Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for console.log with sensitive data patterns
        run: |
          echo "Checking for sensitive data patterns in frontend JS..."
          if grep -rn "console.log.*token\|console.log.*password\|console.log.*secret" frontend/js/ --include="*.js"; then
            echo "WARNING: Potential sensitive data logging found!"
          else
            echo "OK: No sensitive logging patterns found."
          fi

      - name: Validate HTML structure
        run: |
          echo "Checking required PWA meta tags..."
          for file in frontend/index.html frontend/dashboard.html frontend/onboarding.html; do
            grep -q 'manifest.json' "$file" && echo "OK: $file has manifest link" || echo "MISSING: $file needs manifest link"
            grep -q 'serviceWorker' "$file" && echo "OK: $file has SW registration" || echo "MISSING: $file needs SW registration"
          done

  # ─── Security: Dependency Audit ────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies (pip-audit)
        run: |
          pip install pip-audit --quiet
          pip-audit -r backend/requirements.txt --desc || true

      - name: Check .gitignore protects secrets
        run: |
          echo "Verifying .gitignore excludes sensitive paths..."
          git check-ignore backend/.env && echo "OK: .env excluded" || echo "WARNING: .env not excluded!"
          git check-ignore backend/instance/ && echo "OK: instance/ excluded" || echo "WARNING: DB dir not excluded!"

  # ─── Docker: Build Check ────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t strivex-backend:ci -f Dockerfile .

      - name: Verify container starts
        run: |
          docker run -d \
            -e SECRET_KEY=ci-test-only \
            -e CORS_ORIGIN=http://localhost:3001 \
            -p 5001:5001 \
            --name strivex-test \
            strivex-backend:ci
          sleep 4
          curl -f http://localhost:5001/api/health || \
            (docker logs strivex-test; exit 1)
          docker stop strivex-test
