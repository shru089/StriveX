<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StriveX — You're Offline</title>
    <meta name="theme-color" content="#5e6ad2">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08090a;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite alternate;
        }

        .bg-glow-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #5e6ad2, transparent);
            top: -100px;
            left: -100px;
        }

        .bg-glow-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #764ba2, transparent);
            bottom: -80px;
            right: -80px;
            animation-delay: 2s;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
                opacity: 0.12;
            }

            to {
                transform: scale(1.15);
                opacity: 0.2;
            }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        .logo {
            margin-bottom: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #f1f5f9;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .status-text {
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        .status-text strong {
            color: #f1f5f9;
            display: block;
            margin-bottom: 2px;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #5e6ad2, #764ba2);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(94, 106, 210, 0.4);
        }

        .btn-retry:active {
            transform: translateY(0);
        }

        .tip {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(94, 106, 210, 0.08);
            border: 1px solid rgba(94, 106, 210, 0.2);
            border-radius: 10px;
            font-size: 0.8125rem;
            color: #94a3b8;
        }

        .tip strong {
            color: #a5b4fc;
        }
    </style>
</head>

<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 50 50" fill="none">
                <path d="M25 5L45 15V35L25 45L5 35V15L25 5Z" stroke="url(#og1)" stroke-width="3" fill="none" />
                <circle cx="25" cy="25" r="8" fill="url(#og2)" />
                <defs>
                    <linearGradient id="og1" x1="5" y1="5" x2="45" y2="45">
                        <stop offset="0%" stop-color="#667eea" />
                        <stop offset="100%" stop-color="#764ba2" />
                    </linearGradient>
                    <linearGradient id="og2" x1="17" y1="17" x2="33" y2="33">
                        <stop offset="0%" stop-color="#f093fb" />
                        <stop offset="100%" stop-color="#f5576c" />
                    </linearGradient>
                </defs>
            </svg>
            <span>StriveX</span>
        </div>

        <span class="offline-icon">📡</span>

        <h1>You're offline</h1>
        <p>StriveX needs a connection to sync your schedule and goals. Don't worry — your data is safe.</p>

        <div class="status-card">
            <div class="status-dot"></div>
            <div class="status-text">
                <strong>No internet connection</strong>
                Check your Wi-Fi or mobile data and try again.
            </div>
        </div>

        <button class="btn-retry" onclick="retry()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M1 4v6h6M23 20v-6h-6" />
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
            </svg>
            Try Again
        </button>

        <div class="tip">
            💡 <strong>Pro tip:</strong> Once reconnected, StriveX caches your schedule so it loads
            instantly — even on slow connections.
        </div>
    </div>

    <script>
        function retry() {
            window.location.reload();
        }

        // Auto-retry when connection comes back
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
    </script>
</body>

</html>
